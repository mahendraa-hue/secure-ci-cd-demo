# Pipeline CI: build & test → SAST (Bandit) + image scan (Trivy) + DAST (OWASP ZAP) → deploy placeholder.
name: Secure CI/CD Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest app/tests/ -v

  security-scan:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (Bandit)
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      # Kunci keamanan: gagal jika Bandit menemukan temuan severity high (kode aplikasi saja, bukan folder tests).
      - name: SAST — Bandit (laporan JSON)
        run: bandit -r app/ -x app/tests -f json -o bandit-report.json || true

      - name: SAST — Bandit (gate severity high)
        run: bandit -r app/ -x app/tests --severity-level high

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore

      - name: Build Docker image
        run: docker build -t demo-app:ci .

      # Trivy: tidak perlu instal manual CLI — action memakai Trivy resmi (stabil di runner GitHub).
      # Jika base image sering gagal karena CVE belum ada patch: tambahkan ignore-unfixed: "true" (lihat README).
      - name: Trivy — simpan laporan (fallback artefak)
        uses: aquasecurity/trivy-action@v0.18.0
        with:
          scan-type: image
          image-ref: demo-app:ci
          trivyignores: security/trivyignore
          format: table
          output: trivy-report.txt
          exit-code: "0"
          severity: HIGH,CRITICAL

      - name: Trivy — gate HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.18.0
        with:
          scan-type: image
          image-ref: demo-app:ci
          trivyignores: security/trivyignore
          exit-code: "1"
          severity: HIGH,CRITICAL

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: ignore

      - name: Jalankan kontainer aplikasi
        run: |
          docker run -d --name demo-web -p 5000:5000 demo-app:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/ >/dev/null; then
              echo "Aplikasi siap."
              exit 0
            fi
            sleep 2
          done
          echo "Timeout menunggu aplikasi."
          exit 1

      # DAST: action ini menjalankan ZAP dari image Docker resmi (default: ghcr.io/zaproxy/zaproxy:stable).
      # Tidak mem-fail workflow bila ada alert tinggi (lihat README untuk fail_action / cmd_options).
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:5000"
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap_scan

      # Satukan nama file laporan agar mudah ditampilkan di LinkedIn / portofolio.
      - name: Siapkan zap_report.html untuk artefak
        if: always()
        run: |
          SRC=$(find . -maxdepth 4 -name 'report_html.html' -print -quit)
          if [ -n "$SRC" ]; then
            cp "$SRC" zap_report.html
            echo "Laporan ZAP disalin ke zap_report.html dari $SRC"
          else
            echo "Peringatan: report_html.html tidak ditemukan (cek log ZAP)."
          fi

      - name: Upload zap_report.html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap_report
          path: zap_report.html
          if-no-files-found: ignore

      - name: Hentikan kontainer
        if: always()
        run: docker rm -f demo-web 2>/dev/null || true

  deploy:
    needs: security-scan
    # Hanya lanjut bila rantai job sebelumnya sukses (gate Trivy/Bandit lolos).
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ganti langkah ini dengan deploy nyata (Render/Heroku/AWS) + secrets di GitHub.
      - name: Deploy placeholder
        run: bash infra/deploy_example.sh
